
entryPoints:
  web:
    address: ":80"

providers:
  file:
    filename: "/etc/traefik/dynamic.yml"
    watch: true
  consulCatalog:
    prefix: "traefik"
    exposedByDefault: false
    endpoint:
      address: "consul:8500"

api:
  dashboard: true
  insecure: true

log:
  level: INFO